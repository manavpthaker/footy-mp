name: ingest

# Scheduled data + model runs. Writes into Supabase.
# Secrets required: SUPABASE_URL, SUPABASE_SERVICE_KEY.
#
#   daily (06:00 UTC)  — ESPN results/fixtures + current-season Understat xG,
#                        then the BACKTEST GATE, then the model pipeline
#                        (ratings + predictions), then lowdowns.
#   live  (every 15m)  — cheap ESPN refresh; the script exits immediately
#                        unless a match is live or kicking off within ±3h.
#   rosters (Mon 07:00)— national-team squads: nationality/DOB/club links +
#                        transfer detection for the club↔country web.
#   workflow_dispatch  — run any pipeline mode by hand (backfill, seed,
#                        model, backtest, rosters, seasons, ...).

on:
  schedule:
    - cron: "0 6 * * *"     # daily: overnight results + xG + gate + model refresh
    - cron: "*/15 * * * *"  # live: guarded inside data/pipeline.py
    - cron: "0 7 * * 1"     # rosters: weekly, Monday 07:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        type: choice
        default: daily
        options: [daily, live, backfill, seed, model, backtest, players, lowdown, rosters, seasons]
      backfill_seasons:
        description: "Understat season codes for backfill mode (comma-separated)"
        required: false
        default: ""
      player_seasons:
        description: "Season codes for players mode (comma-separated, default: current)"
        required: false
        default: ""

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  daily:
    # scheduled 06:00 run, or manual dispatch in daily mode
    if: github.event.schedule == '0 6 * * *' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'daily')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: data/requirements.txt
      - name: Install deps
        run: pip install -r data/requirements.txt
      - name: Cache key (daily rotation — exact hit on same-day reruns)
        id: cachedate
        run: echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
      - name: Cache soccerdata (Understat/FBref pages)
        uses: actions/cache@v4
        with:
          path: ~/soccerdata
          key: soccerdata-${{ steps.cachedate.outputs.date }}
          restore-keys: soccerdata-
      - name: Ingest (ESPN + Understat)
        run: python -m data.pipeline daily
      - name: Backtest gate (model must beat baseline before it ships)
        run: python -m data.pipeline backtest
      - name: Model (ratings + predictions)
        run: python -m data.pipeline model
      - name: Lowdown (match commentary)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m data.pipeline lowdown   # skips gracefully when the key isn't set

  live:
    # every 15 minutes; data/pipeline.py exits 0 early outside match windows
    if: github.event.schedule == '*/15 * * * *' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'live')
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: data/requirements.txt
      - name: Install deps
        run: pip install -r data/requirements.txt
      - name: Live refresh (guarded)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m data.pipeline live

  rosters:
    # weekly: squads, nationalities, club links, transfer detection
    if: github.event.schedule == '0 7 * * 1'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: data/requirements.txt
      - name: Install deps
        run: pip install -r data/requirements.txt
      - name: National-team rosters
        run: python -m data.pipeline rosters

  manual:
    # any other hand-run mode: backfill / seed / model / backtest / rosters / seasons
    if: github.event_name == 'workflow_dispatch' && !contains(fromJSON('["daily","live"]'), inputs.mode)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: data/requirements.txt
      - name: Install deps
        run: pip install -r data/requirements.txt
      - name: Cache soccerdata (Understat/FBref pages)
        uses: actions/cache@v4
        with:
          path: ~/soccerdata
          key: soccerdata-${{ github.run_id }}
          restore-keys: soccerdata-
      - name: Run ${{ inputs.mode }}
        env:
          PIPELINE_BACKFILL_SEASONS: ${{ inputs.backfill_seasons }}
          PIPELINE_PLAYER_SEASONS: ${{ inputs.player_seasons }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m data.pipeline ${{ inputs.mode }}
