<style>
  html, body { margin: 0; padding: 0; height: 100%; background: var(--coal-950); }
  #root { height: 100vh; height: 100dvh; }
  * { box-sizing: border-box; }
  a { color: var(--accent-2); text-decoration: none; }
  a:hover { color: var(--steel-400); }
  button { font-family: var(--font-ui); }

  .fmp-chip-rail::-webkit-scrollbar { display: none; }

  /* tablet cap for the single-column mobile layout */
  .fmp-cap { max-width: 600px; width: 100%; margin: 0 auto; }

  /* desktop header tabs */
  .fmp-htab { color: var(--text-faint); }
  .fmp-htab:hover { color: var(--text-muted); }
  .fmp-htab[data-on="true"] { color: var(--accent); }

  .fmp-live-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--status-live); margin-right: 2px; vertical-align: middle;
    animation: fmpPulse 1.4s ease-out infinite;
  }
  @keyframes fmpPulse {
    0% { box-shadow: 0 0 0 0 rgba(255, 93, 58, 0.55); }
    70% { box-shadow: 0 0 0 6px rgba(255, 93, 58, 0); }
    100% { box-shadow: 0 0 0 0 rgba(255, 93, 58, 0); }
  }

  @media (prefers-reduced-motion: no-preference) {
    .fmp-screen-enter { animation: fmpFadeUp 0.28s var(--ease-out); }
  }
  @keyframes fmpFadeUp {
    from { opacity: 0; transform: translateY(9px); }
    to { opacity: 1; transform: none; }
  }
</style>
