<!DOCTYPE html>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  body { margin: 0; background: var(--bg-app); color: var(--text-primary); font-family: var(--font-ui);
    background-image: var(--grad-app); padding: 20px; }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 16px; }
  .lbl { font-size: var(--fs-2xs); text-transform: uppercase; letter-spacing: var(--tracking-label);

<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Tag, SectionHeading } = window.WC26VisualizerDesignSystem_b4eaf5;
  function Demo() {
    return (
      <div>
        <div className="row"><span className="lbl">Buttons</span>
          <Button variant="primary" iconLeft="⚡">Auto-fill by model</Button>
          <Button variant="gold">Crown champion</Button>
          <Button variant="secondary" iconLeft="↺">Reset</Button>
          <Button variant="ghost" iconRight="→">Match&nbsp;# order</Button>
          <Button variant="secondary" disabled>Disabled</Button>
          <IconButton title="Sync">⟳</IconButton>
          <IconButton title="Settings" active>⚙</IconButton>
        </div>
        <div className="row"><span className="lbl">Status tags</span>
          <Tag tone="qualified">Q</Tag>
          <Tag tone="out">OUT</Tag>
          <Tag tone="pill">1st in Group A</Tag>
          <Tag tone="gold">★ Key</Tag>
          <Tag tone="accent">Round of 16</Tag>
        </div>
        <div style={{maxWidth: 520}}>
          <SectionHeading trailing="69/99">Model rating — composite strength</SectionHeading>
          <SectionHeading tick="var(--accent-2)">Pre-match forecast</SectionHeading>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
