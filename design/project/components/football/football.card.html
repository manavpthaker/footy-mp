<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--bg-app); color: var(--text-primary); font-family: var(--font-ui);
    background-image: var(--grad-app); padding: 20px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: start; }
  .players { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .lbl { font-size: var(--fs-2xs); text-transform: uppercase; letter-spacing: var(--tracking-label);
    color: var(--text-faint); font-weight: var(--fw-bold); margin-bottom: 8px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { GroupStandings, PlayerCard, MatchRow } = window.WC26VisualizerDesignSystem_b4eaf5;
  const groupC = [
    { team:'Brazil', flag:'🇧🇷', rank:6, P:3, W:2, D:1, L:0, GF:7, GA:1, Pts:7, status:'qualified' },
    { team:'Morocco', flag:'🇲🇦', rank:7, P:3, W:2, D:1, L:0, GF:6, GA:3, Pts:7, status:'qualified' },
    { team:'Scotland', flag:'🏴󠁧󠁢󠁳󠁣󠁴󠁿', rank:42, P:3, W:1, D:0, L:2, GF:1, GA:4, Pts:3, status:'active' },
    { team:'Haiti', flag:'🇭🇹', rank:83, P:3, W:0, D:0, L:3, GF:2, GA:8, Pts:0, status:'eliminated' },
  ];
  function Demo() {
    return (
      <div className="grid">
        <div>
          <div className="lbl">Group standings</div>
          <GroupStandings group="C" teams={groupC} onSelect={() => {}} />
        </div>
        <div>
          <div className="lbl">Key players</div>
          <div className="players">
            <PlayerCard lead={25} name="Vinícius Júnior" club="Real Madrid" caps={42} isKey />
            <PlayerCard lead={28} name="Raphinha" club="Barcelona" caps={45} isKey />
            <PlayerCard lead={26} name="Bruno Guimarães" club="Newcastle" caps={38} />
            <PlayerCard lead={32} name="Alisson" club="Liverpool" caps={71} />
          </div>
          <div className="lbl">Matches</div>
          <MatchRow date="Jun 29" homeFlag="🇧🇷" home="BRA" awayFlag="🇯🇵" away="JPN"
            right={<span style={{color:'var(--accent-2)',fontWeight:700,fontSize:11}}>PREVIEW →</span>} />
          <MatchRow date="Jun 24" homeFlag="🏴󠁧󠁢󠁳󠁣󠁴󠁿" home="SCO" awayFlag="🇧🇷" away="BRA"
            right={<b style={{fontFamily:'var(--font-mono)'}}>0–3</b>} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
