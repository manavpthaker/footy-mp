<!-- @dsCard group="Brand" viewport="700x150" name="Iconography — emoji & unicode" subtitle="No icon font; flags + glyphs carry meaning" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-app);background-image:var(--grad-app);font-family:var(--font-ui);padding:16px;color:var(--text-primary)}
  .grid{display:flex;gap:9px;flex-wrap:wrap}
  .g{display:flex;flex-direction:column;align-items:center;gap:5px;background:var(--surface-panel);border:1px solid var(--border);border-radius:var(--radius-lg);padding:9px 12px;min-width:64px}
  .gl{font-size:20px}
  .lb{font-family:var(--font-mono);font-size:var(--fs-micro);color:var(--text-faint)}
  .flags{font-size:22px;letter-spacing:4px;margin-top:12px}
  .tag{font-family:var(--font-mono);font-size:var(--fs-micro);color:var(--text-faint);margin-top:10px}
</style></head>
<body>
  <div class="grid">
    <div class="g"><span class="gl">🏆</span><span class="lb">mark</span></div>
    <div class="g"><span class="gl">⚡</span><span class="lb">model</span></div>
    <div class="g"><span class="gl">⟳</span><span class="lb">sync</span></div>
    <div class="g"><span class="gl">⚙</span><span class="lb">settings</span></div>
    <div class="g"><span class="gl">⏱</span><span class="lb">upcoming</span></div>
    <div class="g"><span class="gl" style="color:var(--status-live)">●</span><span class="lb">live</span></div>
    <div class="g"><span class="gl">⭐</span><span class="lb">key</span></div>
    <div class="g"><span class="gl">↺</span><span class="lb">reset</span></div>
    <div class="g"><span class="gl">→</span><span class="lb">preview</span></div>
  </div>
  <div class="flags">🇧🇷 🇫🇷 🇲🇽 🇯🇵 🇲🇦 🏴󠁧󠁢󠁥󠁮󠁧󠁿 🏴󠁧󠁢󠁳󠁣󠁴󠁿 ⚽</div>
  <div class="tag">Country flag emoji = team identity (⚽ fallback) · subdivision tags for England/Scotland</div>
</body></html>
