<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-app);background-image:var(--grad-header);font-family:var(--font-ui);padding:22px;color:var(--text-primary)}
  .brand{display:flex;align-items:center;gap:12px}
  .trophy{width:40px;height:40px;border-radius:10px;background:var(--grad-gold);display:grid;place-items:center;font-size:22px;box-shadow:var(--shadow-gold)}
  h1{font-family:var(--font-display);font-size:18px;margin:0;font-weight:800;letter-spacing:.3px}
  .sub{font-size:var(--fs-xs);color:var(--text-muted);margin-top:2px}
  .tag{font-family:var(--font-mono);font-size:var(--fs-micro);color:var(--text-faint);margin-top:18px}
</style></head>
<body>
  <div class="brand">
    <div class="trophy">🏆</div>
    <div><h1>MP&rsquo;S WORLD CUP VISUALIZER</h1><div class="sub">2026 · USA · Canada · Mexico · 48 teams</div></div>
  </div>
  <div class="tag">The 🏆 in a gold-gradient rounded square is the de-facto logo · Archivo 800 wordmark · gold badge bobs gently on the live app</div>
</body></html>
