<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces — navy ramp" subtitle="Stadium-at-night background & panel surfaces" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-app);background-image:var(--grad-app);font-family:var(--font-ui);padding:16px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .sw{flex:1;min-width:88px;border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden}
  .chip{height:54px}
  .meta{padding:7px 9px;background:var(--surface-panel)}
  .nm{font-size:var(--fs-xs);font-weight:var(--fw-bold);color:var(--text-primary)}
  .hex{font-family:var(--font-mono);font-size:var(--fs-micro);color:var(--text-faint);margin-top:2px}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--navy-950)"></div><div class="meta"><div class="nm">navy-950</div><div class="hex">#080b14</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-900)"></div><div class="meta"><div class="nm">bg-app</div><div class="hex">#0a0e1a</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-850)"></div><div class="meta"><div class="nm">bg-sunken</div><div class="hex">#0f1626</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-800)"></div><div class="meta"><div class="nm">surface-panel</div><div class="hex">#131c2e</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-700)"></div><div class="meta"><div class="nm">surface-raised</div><div class="hex">#18233a</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-650)"></div><div class="meta"><div class="nm">surface-hover</div><div class="hex">#1a2740</div></div></div>
  </div>
</body></html>
