<!-- @dsCard group="Spacing" viewport="700x140" name="Spacing scale" subtitle="4px-based rhythm" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-app);background-image:var(--grad-app);font-family:var(--font-ui);padding:18px}
  .row{display:flex;align-items:flex-end;gap:14px}
  .col{text-align:center}
  .bar{background:var(--grad-pitch);border-radius:var(--radius-xs)}
  .nm{font-family:var(--font-mono);font-size:var(--fs-micro);color:var(--text-faint);margin-top:7px}
  .v{font-family:var(--font-mono);font-size:var(--fs-2xs);color:var(--text-primary);font-weight:var(--fw-bold)}
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="width:24px;height:4px"></div><div class="v">4</div><div class="nm">space-1</div></div>
    <div class="col"><div class="bar" style="width:24px;height:6px"></div><div class="v">6</div><div class="nm">space-2</div></div>
    <div class="col"><div class="bar" style="width:24px;height:8px"></div><div class="v">8</div><div class="nm">space-3</div></div>
    <div class="col"><div class="bar" style="width:24px;height:10px"></div><div class="v">10</div><div class="nm">space-4</div></div>
    <div class="col"><div class="bar" style="width:24px;height:12px"></div><div class="v">12</div><div class="nm">space-5</div></div>
    <div class="col"><div class="bar" style="width:24px;height:14px"></div><div class="v">14</div><div class="nm">space-6</div></div>
    <div class="col"><div class="bar" style="width:24px;height:16px"></div><div class="v">16</div><div class="nm">space-7</div></div>
    <div class="col"><div class="bar" style="width:24px;height:18px"></div><div class="v">18</div><div class="nm">space-8</div></div>
    <div class="col"><div class="bar" style="width:24px;height:22px"></div><div class="v">22</div><div class="nm">space-9</div></div>
    <div class="col"><div class="bar" style="width:24px;height:28px"></div><div class="v">28</div><div class="nm">space-10</div></div>
  </div>
</body></html>
