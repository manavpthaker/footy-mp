<!-- @dsCard group="Type" viewport="700x150" name="Data — JetBrains Mono" subtitle="Every figure, tabular-aligned" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-app);background-image:var(--grad-app);font-family:var(--font-ui);padding:18px;color:var(--text-primary)}
  table{font-family:var(--font-mono);font-variant-numeric:tabular-nums;border-collapse:collapse;font-size:var(--fs-body)}
  td{padding:3px 12px 3px 0;text-align:right}
  td.l{text-align:left;font-family:var(--font-ui);font-weight:var(--fw-semibold)}
  .big{font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-size:30px;font-weight:var(--fw-bold)}
  .acc{color:var(--accent)}
  .tag{font-family:var(--font-mono);font-size:var(--fs-micro);color:var(--text-faint);margin-top:12px}
</style></head>
<body>
  <div style="display:flex;align-items:center;gap:28px">
    <div><span class="big">69</span><span style="color:var(--text-faint)">/99</span></div>
    <table>
      <tr><td class="l">Brazil</td><td>#6</td><td>1763</td><td>7</td><td class="acc">18.4%</td></tr>
      <tr><td class="l">France</td><td>#3</td><td>1869</td><td>9</td><td class="acc">22.7%</td></tr>
      <tr><td class="l">Argentina</td><td>#1</td><td>1875</td><td>6</td><td class="acc">9.1%</td></tr>
    </table>
  </div>
  <div class="tag">JetBrains Mono · 400 / 500 / 600 / 700 · tabular-nums — ranks, points, %, odds, scores</div>
</body></html>
