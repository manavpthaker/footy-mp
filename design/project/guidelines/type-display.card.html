<!-- @dsCard group="Type" viewport="700x150" name="Display — Archivo" subtitle="Scoreboard headings, team names, big scores" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-app);background-image:var(--grad-app);font-family:var(--font-ui);padding:18px;color:var(--text-primary)}
  .hero{font-family:var(--font-display);font-weight:800;font-size:36px;letter-spacing:var(--tracking-tight);line-height:1}
  .title{font-family:var(--font-display);font-weight:700;font-size:19px;margin-top:10px}
  .tag{font-family:var(--font-mono);font-size:var(--fs-micro);color:var(--text-faint);margin-top:10px}
  .score{font-family:var(--font-display);font-weight:900;font-size:30px;color:var(--gold)}
</style></head>
<body>
  <div class="hero">Brazil <span style="color:var(--text-faint);font-weight:700">vs</span> Morocco</div>
  <div style="display:flex;align-items:baseline;gap:16px">
    <div class="title">Knockout Predictor</div>
    <div class="score">3–1</div>
  </div>
  <div class="tag">Archivo · 700 / 800 / 900 · team names, view titles, scores &amp; xG</div>
</body></html>
