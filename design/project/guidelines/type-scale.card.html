<!-- @dsCard group="Type" viewport="700x160" name="Scale & eyebrows" subtitle="Sizes and the uppercase label system" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-app);background-image:var(--grad-app);font-family:var(--font-ui);padding:16px;color:var(--text-primary)}
  .r{display:flex;align-items:baseline;gap:12px;margin-bottom:5px}
  .tag{font-family:var(--font-mono);font-size:var(--fs-micro);color:var(--text-faint);width:120px;flex:0 0 auto}
  .eyebrow{font-size:var(--fs-2xs);text-transform:uppercase;letter-spacing:var(--tracking-label);color:var(--text-faint);font-weight:var(--fw-bold)}
  .sec{display:flex;align-items:center;gap:9px;font-size:var(--fs-sm);text-transform:uppercase;letter-spacing:var(--tracking-wide);color:var(--text-muted);font-weight:var(--fw-bold);margin-top:10px}
  .tick{width:4px;height:14px;border-radius:3px;background:var(--accent)}
</style></head>
<body>
  <div class="r"><span class="tag">hero · 26/800</span><span style="font-family:var(--font-display);font-size:var(--fs-hero);font-weight:800">Team name hero</span></div>
  <div class="r"><span class="tag">title · 19/700</span><span style="font-family:var(--font-display);font-size:var(--fs-title);font-weight:700">View title</span></div>
  <div class="r"><span class="tag">stat · 21 mono</span><span style="font-family:var(--font-mono);font-size:var(--fs-stat);font-weight:700">1763</span></div>
  <div class="r"><span class="tag">body · 13/400</span><span style="font-size:var(--fs-body)">Interface body copy</span></div>
  <div class="r"><span class="tag">eyebrow · 10/700</span><span class="eyebrow">FIFA World Rank</span></div>
  <div class="sec"><span class="tick"></span>Pre-match forecast</div>
</body></html>
