<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='88'%3E%F0%9F%8F%86%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='88'%3E%F0%9F%8F%86%3C/text%3E%3C/svg%3E">
<title>MP's World Cup Visualizer 2026</title>
<meta name="description" content="An interactive 2026 World Cup explorer: live group standings, full squads for all 48 teams, match previews, and a knockout predictor powered by a composite-rating Poisson model backtested on Qatar 2022.">
<meta name="author" content="Manav Thaker">
<meta property="og:type" content="website">
<meta property="og:title" content="MP's World Cup Visualizer 2026">
<meta property="og:description" content="Live group standings, full 48-team squads, match previews, and a tunable knockout predictor with model win probabilities. Backtested on Qatar 2022.">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="MP's World Cup Visualizer 2026">
<meta name="twitter:description" content="Click into any team for squads and win probabilities, preview matches, and run the knockout predictor. A composite-rating + Poisson model you can tune live.">
<style>
:root{
  --bg:#0a0e1a; --bg2:#0f1626; --panel:#131c2e; --panel2:#18233a; --line:#243450;
  --txt:#e8eefc; --mut:#8aa0c8; --mut2:#5d7099; --acc:#3ddc97; --acc2:#28b6ff;
  --gold:#ffd24a; --red:#ff5d6c; --warn:#ffb13d; --chipq:#173d2e; --chipe:#3a1820;
  --shadow:0 8px 30px rgba(0,0,0,.45);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  background:radial-gradient(1200px 700px at 80% -10%,#10243f 0%,var(--bg) 55%);color:var(--txt);
  font-size:13px;line-height:1.45;-webkit-font-smoothing:antialiased;overflow:hidden}
a{color:inherit}
.app{display:flex;flex-direction:column;height:100vh}
/* Header */
header.top{display:flex;align-items:center;gap:18px;padding:10px 18px;background:linear-gradient(90deg,#0c1322,#101b30);
  border-bottom:1px solid var(--line);flex:0 0 auto;z-index:30}
.brand{display:flex;align-items:center;gap:11px}
.trophy{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--gold),#e09b1a);
  display:grid;place-items:center;font-size:19px;box-shadow:0 4px 14px rgba(255,170,30,.35)}
.brand h1{font-size:15px;margin:0;letter-spacing:.3px;font-weight:800}
.brand .sub{font-size:11px;color:var(--mut);margin-top:1px}
.tabs{display:flex;gap:4px;background:var(--panel);padding:4px;border-radius:11px;border:1px solid var(--line)}
.tab{padding:7px 16px;border-radius:8px;cursor:pointer;font-weight:600;color:var(--mut);font-size:12.5px;
  border:none;background:none;transition:.15s}
.tab:hover{color:var(--txt)}
.tab.on{background:linear-gradient(135deg,var(--acc),#21c07a);color:#06241a;box-shadow:0 3px 12px rgba(61,220,151,.3)}
.spacer{flex:1}
.searchbox{position:relative}
.searchbox input{background:var(--panel);border:1px solid var(--line);border-radius:9px;color:var(--txt);
  padding:8px 12px 8px 32px;width:210px;font-size:12.5px;outline:none}
.searchbox input:focus{border-color:var(--acc2)}
.searchbox svg{position:absolute;left:10px;top:9px;opacity:.5}
.upd{font-size:11px;color:var(--mut2);text-align:right;line-height:1.3}
/* Layout */
.stage{flex:1;display:flex;min-height:0;overflow:hidden}
.col-groups{flex:0 0 460px;overflow-y:auto;padding:14px;border-right:1px solid var(--line)}
.col-detail{flex:1;overflow-y:auto;padding:18px 22px;min-width:0}
.full{flex:1;overflow-y:auto;padding:18px 22px}
/* scrollbars */
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#22324d;border-radius:6px}
::-webkit-scrollbar-track{background:transparent}
/* Group cards */
.grp{background:var(--panel);border:1px solid var(--line);border-radius:13px;margin-bottom:12px;overflow:hidden}
.grp h3{margin:0;padding:9px 13px;font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--mut);
  background:var(--panel2);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line)}
.grp h3 .gl{width:20px;height:20px;border-radius:6px;background:linear-gradient(135deg,var(--acc2),#1d7fd6);
  color:#04263f;display:grid;place-items:center;font-weight:800;font-size:11px}
table.stand{width:100%;border-collapse:collapse}
table.stand th{font-size:9.5px;color:var(--mut2);font-weight:600;text-align:center;padding:5px 3px;text-transform:uppercase}
table.stand th.l{text-align:left;padding-left:13px}
table.stand td{padding:6px 3px;text-align:center;border-top:1px solid #1b2740;font-variant-numeric:tabular-nums}
table.stand tr.team-row{cursor:pointer;transition:.12s}
table.stand tr.team-row:hover{background:#1a2740}
td.tm{text-align:left;padding-left:9px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.flag{display:inline-block;width:20px;text-align:center;margin-right:6px;font-size:14px}
.pos{display:inline-block;width:15px;color:var(--mut2);font-size:10px}
.pts{font-weight:800;color:var(--txt)}
.bd-q{box-shadow:inset 3px 0 0 var(--acc)}
.bd-2{box-shadow:inset 3px 0 0 var(--acc2)}
.bd-3{box-shadow:inset 3px 0 0 var(--warn)}
.bd-e{box-shadow:inset 3px 0 0 var(--red);opacity:.62}
.rk{font-size:9.5px;color:var(--mut2)}
.tag{font-size:8.5px;padding:1px 5px;border-radius:5px;margin-left:5px;font-weight:700;vertical-align:middle}
.tag.q{background:var(--chipq);color:var(--acc)}
.tag.e{background:var(--chipe);color:var(--red)}
.legend{display:flex;gap:13px;flex-wrap:wrap;font-size:10px;color:var(--mut);margin:2px 2px 12px}
.legend span{display:flex;align-items:center;gap:5px}
.dot{width:9px;height:9px;border-radius:3px;display:inline-block}
/* Fixtures rail */
.railhead{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut2);margin:16px 4px 8px;font-weight:700}
.fx{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:10px;
  padding:8px 11px;margin-bottom:7px;cursor:pointer;transition:.12s}
.fx:hover{border-color:var(--acc2);background:#16223a}
.fx .d{font-size:10px;color:var(--mut2);width:42px;flex:0 0 auto}
.fx .mt{flex:1;font-weight:600;font-size:12px}
.fx .pv{font-size:10px;color:var(--acc2);font-weight:700;white-space:nowrap}
.mrow{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:9px 12px;margin-bottom:7px;cursor:pointer;transition:.12s}
.mrow:hover{border-color:var(--acc2);background:#16223a}
.mrow .mdate{font-size:10px;color:var(--mut2);width:44px;flex:0 0 auto;line-height:1.25}
.mrow .mteams{flex:1;font-weight:600;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mrow .mteams .vs{color:var(--mut2);font-weight:400;margin:0 4px}
.mrow .mmeta{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex:0 0 auto}
.mrow .mscore{font-weight:800;font-variant-numeric:tabular-nums;font-size:14px}
.mrow .mlive{font-size:10px;color:#ff6b81;font-weight:800}
.mrow .mfav{font-size:11px;color:var(--acc);font-weight:700}
.mrow .mgrp{font-size:9px;color:var(--mut2)}
.mnone{font-size:12px;color:var(--mut2);padding:10px 4px}
.pcard{cursor:pointer}
.tags2{display:flex;flex-wrap:wrap;gap:8px}
.tag2{font-size:12px;background:#1c2a44;color:var(--acc);padding:6px 12px;border-radius:18px;font-weight:600;border:1px solid #2a3c5c}
.cvc{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cvcbox{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
.cvch{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut2);font-weight:700;margin-bottom:5px}
.cvcbox p{margin:0;font-size:13px;color:var(--txt);line-height:1.5}
.resultcard{background:linear-gradient(135deg,#13241a,#131c2e);border:1px solid #2c5a3e;border-radius:14px;padding:14px;margin-bottom:16px;text-align:center}
.rlabel{font-size:11px;font-weight:800;letter-spacing:.5px;color:var(--acc);text-transform:uppercase}
.rscore{font-size:16px;font-weight:700;margin:9px 0 4px}
.rscore b{font-size:23px;margin:0 8px;font-variant-numeric:tabular-nums}
.rres{font-size:12px;color:var(--mut)}
.lowdown{background:#15203a;border:1px solid var(--line);border-left:3px solid var(--acc2);border-radius:0 12px 12px 0;padding:13px 16px;margin-bottom:16px}
.ldh{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--acc2);font-weight:800;margin-bottom:7px}
.lowdown p{margin:0;font-size:13.5px;line-height:1.65;color:var(--txt)}
.lowdown p+p{margin-top:9px}
.lowdown b{color:#fff}
.toast{position:fixed;left:50%;bottom:calc(78px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(18px);
  background:#0f1b30;border:1px solid var(--line);border-radius:11px;padding:11px 16px;font-size:13px;font-weight:600;
  color:var(--txt);box-shadow:0 12px 34px rgba(0,0,0,.5);z-index:200;opacity:0;pointer-events:none;transition:.3s;max-width:88vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;cursor:pointer}
.toast.ok{border-color:#2c5a3e}
.toast.warn{border-color:var(--warn)}
.toast.info{border-color:var(--acc2)}
/* ---- microanimations ---- */
@keyframes fadeUp{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}
@keyframes barGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes popIn{0%{opacity:0;transform:scale(.92)}60%{transform:scale(1.03)}100%{opacity:1;transform:scale(1)}}
@keyframes bob{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-2px) rotate(-5deg)}}
.hero,.mp-head,.lowdown,.livecard,.resultcard,.ringwrap,.xgline{animation:fadeUp .3s ease both}
.fbar i,.obar i,.lsbar i{transform-origin:left center;animation:barGrow .5s cubic-bezier(.4,0,.2,1) both}
.champ .box{animation:popIn .42s ease both}
.trophy{animation:bob 3.2s ease-in-out infinite}
.brand h1{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.grp,.stat,.panelcard,.mrow,.pcard,.fx,.tie{transition:transform .14s ease, box-shadow .14s ease, border-color .12s ease}
.grp:hover,.stat:hover,.panelcard:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,.28)}
.mrow:hover,.pcard:hover{transform:translateY(-1px)}
.cta,.mp-side,.modetoggle button{transition:transform .14s ease, background .15s ease, border-color .14s ease, box-shadow .15s ease}
.mp-side:hover{transform:translateY(-2px)}
.team-row{transition:background .12s ease, transform .12s ease}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}}
/* Detail / hero */
.empty{display:grid;place-items:center;height:100%;color:var(--mut2);text-align:center}
.empty .big{font-size:46px;margin-bottom:10px}
.hero{display:flex;align-items:center;gap:18px;margin-bottom:18px}
.hero .fg{font-size:54px;line-height:1}
.hero h2{margin:0;font-size:26px;font-weight:800}
.hero .meta{color:var(--mut);font-size:12.5px;margin-top:3px}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.stat .k{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut2)}
.stat .v{font-size:21px;font-weight:800;margin-top:3px;font-variant-numeric:tabular-nums}
.stat .v small{font-size:12px;color:var(--mut);font-weight:600}
.sechead{font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--mut);font-weight:700;
  margin:22px 0 11px;display:flex;align-items:center;gap:9px}
.sechead:before{content:"";width:4px;height:14px;background:var(--acc);border-radius:3px}
/* Form pills */
.form{display:flex;gap:5px}
.fp{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-size:11px;font-weight:800;color:#06140d}
.fp.W{background:var(--acc)} .fp.D{background:#506182;color:#dfe8fb} .fp.L{background:var(--red);color:#fff}
/* Squad */
.posblock{margin-bottom:14px}
.posblock .pl{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut2);margin:0 0 7px;font-weight:700}
.players{display:grid;grid-template-columns:repeat(auto-fill,minmax(186px,1fr));gap:8px}
.pcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 11px;display:flex;
  align-items:center;gap:9px;position:relative}
.pcard.key{border-color:#3a4f33;background:linear-gradient(135deg,#16241a,#131c2e)}
.pnum{width:26px;height:26px;border-radius:8px;background:var(--panel2);display:grid;place-items:center;
  font-size:10px;font-weight:800;color:var(--mut);flex:0 0 auto}
.pcard.key .pnum{background:var(--acc);color:#06241a}
.pmain{min-width:0}
.pname{font-weight:700;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pclub{font-size:10.5px;color:var(--mut2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pmeta{margin-left:auto;text-align:right;flex:0 0 auto}
.page{font-size:11px;color:var(--mut);font-variant-numeric:tabular-nums}
.pcaps{font-size:9.5px;color:var(--mut2)}
.star{position:absolute;top:-6px;right:-6px;font-size:13px}
/* Match preview */
.mp-head{display:flex;align-items:stretch;gap:14px;margin-bottom:18px}
.mp-side{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center;cursor:pointer;transition:.15s}
.mp-side:hover{border-color:var(--acc2)}
.mp-side .fg{font-size:40px}
.mp-side .nm{font-weight:800;font-size:16px;margin:6px 0 2px}
.mp-side .rk{font-size:11px;color:var(--mut)}
.mp-vs{display:grid;place-items:center;font-weight:800;color:var(--mut2);font-size:13px;padding:0 4px}
.mp-vs .ko{font-size:9px;color:var(--mut2);margin-top:6px;max-width:70px;text-align:center}
.probbar{height:34px;border-radius:9px;overflow:hidden;display:flex;font-weight:800;font-size:12px;margin-bottom:6px;border:1px solid var(--line)}
.pb{display:grid;place-items:center;transition:width .5s;min-width:34px}
.pb.h{background:linear-gradient(135deg,var(--acc2),#1c7fd4);color:#04263f}
.pb.d{background:#374864;color:#cdd9ef}
.pb.a{background:linear-gradient(135deg,var(--acc),#1fb978);color:#06241a}
.problabels{display:flex;justify-content:space-between;font-size:10.5px;color:var(--mut2);margin-bottom:16px}
.cmp{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center;margin-bottom:18px}
.kf{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.kf .col h4{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin:0 0 8px}
/* Bracket */
.brk-top{display:flex;align-items:center;gap:14px;margin-bottom:6px;flex-wrap:wrap}
.brk-top h2{margin:0;font-size:19px}
.btn{padding:8px 14px;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--txt);
  font-weight:700;font-size:12px;cursor:pointer;transition:.14s}
.btn:hover{border-color:var(--acc2)}
.btn.pri{background:linear-gradient(135deg,var(--acc),#1fb978);color:#06241a;border:none}
.btn.gold{background:linear-gradient(135deg,var(--gold),#e0a01a);color:#3a2600;border:none}
.note{font-size:11px;color:var(--mut2);margin:2px 0 14px;max-width:900px}
.brk-asof{font-size:11.5px;color:var(--warn);margin:0 0 12px;font-weight:600}
.railhead.live{color:#ff5a5a}
.bracket{display:flex;gap:20px;overflow-x:auto;padding-bottom:14px;align-items:stretch;position:relative}
.round{display:flex;flex-direction:column;justify-content:space-around;gap:6px;min-width:188px;position:relative;z-index:1}
.round .rh{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut2);font-weight:700;
  text-align:center;margin-bottom:2px;position:sticky;top:0}
.tie{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.tienum{font-size:8px;color:var(--mut2);padding:3px 8px 0;text-align:right;letter-spacing:.3px}
.bracket-lines{position:absolute;top:0;left:0;pointer-events:none;z-index:0;overflow:visible}
.bline{fill:none;stroke:#2c3e5e;stroke-width:2}
.bline.win{stroke:var(--acc);stroke-width:2.5}
.slot{display:flex;align-items:center;gap:7px;padding:7px 9px;cursor:pointer;font-size:12px;transition:.1s;border-left:3px solid transparent}
.slot:hover{background:#1a2740}
.slot+.slot{border-top:1px solid #1b2740}
.slot.win{border-left-color:var(--acc);font-weight:800}
.slot.lose{opacity:.4}
.slot .sf{font-size:14px;width:18px;text-align:center}
.slot .sn{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot .sp{font-size:10px;color:var(--mut2);font-variant-numeric:tabular-nums}
.slot.win .sp{color:var(--acc)}
.champ{display:grid;place-items:center;min-width:188px}
.champ .box{background:linear-gradient(135deg,#1d2b1f,#142033);border:1px solid var(--acc);border-radius:14px;
  padding:20px 16px;text-align:center;width:100%}
.champ .fg{font-size:46px}
.champ .nm{font-weight:800;font-size:16px;margin-top:6px}
.champ .lbl{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.bracket.two{justify-content:flex-start}
.bracket.two .round{min-width:152px}
.round.center{justify-content:center;gap:14px;min-width:170px}
.round.center .rh{text-align:center}
.round.center .champ{min-width:0}
.round.center .champ .box{padding:14px 16px}
.round.center .champ .fg{font-size:38px}
.round.right .rh{text-align:right}
.round.right .slot{flex-direction:row-reverse}
.round.right .slot .sn{text-align:right}
.round.right .tienum{text-align:left}
/* Odds table */
.odds{width:100%;border-collapse:collapse;margin-top:6px}
.odds th{font-size:10px;text-transform:uppercase;color:var(--mut2);text-align:left;padding:6px 8px;font-weight:600}
.odds td{padding:7px 8px;border-top:1px solid #1b2740;font-variant-numeric:tabular-nums}
.odds tr{cursor:pointer}
.odds tr:hover td{background:#1a2740}
.obar{height:7px;border-radius:4px;background:#21314d;overflow:hidden;min-width:60px}
.obar i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2))}
.pill{display:inline-block;font-size:9.5px;padding:2px 7px;border-radius:6px;background:var(--panel2);color:var(--mut);font-weight:700}
.cardgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.panelcard{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:16px}
/* rating factors + ring */
.factor{display:grid;grid-template-columns:74px 1fr 42px;gap:9px;align-items:center;margin-bottom:6px}
.factor .fl{color:var(--mut);text-transform:uppercase;letter-spacing:.4px;font-size:9px;font-weight:700}
.fbar{height:9px;border-radius:5px;background:#21314d;overflow:hidden;position:relative}
.fbar i{display:block;height:100%;border-radius:5px;transition:width .4s}
.fbar .mid{position:absolute;left:50%;top:-2px;width:1px;height:13px;background:#46598040;z-index:1}
.fval{text-align:right;font-variant-numeric:tabular-nums;color:var(--txt);font-weight:700;font-size:11px}
.ringwrap{display:flex;align-items:center;gap:18px;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin-bottom:6px}
.ring{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;
  background:conic-gradient(var(--acc) calc(var(--p)*1%), #21314d 0)}
.ring b{width:50px;height:50px;border-radius:50%;background:var(--panel);display:grid;place-items:center;font-size:19px;font-weight:800}
.xgline{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;background:var(--panel);
  border:1px solid var(--line);border-radius:12px;padding:12px 16px;margin-bottom:12px}
.xg{display:flex;flex-direction:column}
.xgv{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums}
.xgk{font-size:9.5px;color:var(--mut2);text-transform:uppercase;letter-spacing:.4px}
.xgscore{text-align:center;font-size:10px;color:var(--mut2);text-transform:uppercase;letter-spacing:.5px}
.xgscore b{font-size:20px;color:var(--gold);display:block;margin-top:2px}
/* controls panel */
.ctrlbtn{width:34px;height:34px;border-radius:9px;background:var(--panel);border:1px solid var(--line);cursor:pointer;
  display:grid;place-items:center;color:var(--mut);font-size:16px;flex:0 0 auto}
.ctrlbtn:hover{color:var(--txt);border-color:var(--acc2)}
.ctrlbtn.spin{animation:spin 1s linear infinite;color:var(--acc)}
@keyframes spin{to{transform:rotate(360deg)}}
.ctrlpanel{position:absolute;top:60px;right:18px;width:340px;background:var(--panel2);border:1px solid var(--line);
  border-radius:14px;box-shadow:var(--shadow);padding:16px;z-index:60;display:none}
.ctrlpanel.on{display:block}
.ctrlpanel h4{margin:0 0 3px;font-size:13px}
.grp2{margin:12px 0 2px;font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--acc2);font-weight:700}
.slider{display:grid;grid-template-columns:66px 1fr 36px;gap:9px;align-items:center;margin:6px 0;font-size:11px}
.slider label{color:var(--mut)}
.slider input[type=range]{width:100%;accent-color:var(--acc)}
.slider .sv{text-align:right;font-weight:700;font-variant-numeric:tabular-nums;color:var(--acc)}
/* live in-game card */
.livecard{background:linear-gradient(135deg,#1c1320,#131c2e);border:1px solid #5a2740;border-radius:14px;padding:14px;margin-bottom:16px}
.livetop{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:800;letter-spacing:.5px;color:#ff6b81;text-transform:uppercase}
.livedot{width:9px;height:9px;border-radius:50%;background:#ff3b54;animation:pulse 1.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,59,84,.5)}70%{box-shadow:0 0 0 7px rgba(255,59,84,0)}100%{box-shadow:0 0 0 0 rgba(255,59,84,0)}}
.simx{margin-left:auto;color:var(--mut);cursor:pointer;font-weight:700;text-transform:none;letter-spacing:0}
.livescore{text-align:center;font-size:16px;font-weight:700;margin:9px 0 12px}
.livescore b{font-size:23px;margin:0 7px;font-variant-numeric:tabular-nums}
.modetoggle{display:flex;gap:6px;margin-bottom:11px}
.modetoggle button{flex:1;padding:8px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--mut);font-weight:700;font-size:11px;cursor:pointer}
.modetoggle button.on{background:linear-gradient(135deg,#ff6b81,#d83a55);color:#2a0a12;border:none}
.othermode{font-size:10.5px;color:var(--mut2);text-align:center;margin:7px 0 13px}
.lstats{display:flex;flex-direction:column;gap:8px}
.lstat{display:grid;grid-template-columns:30px 1fr 96px 1fr 30px;gap:6px;align-items:center}
.lstat .lsv{font-weight:800;font-variant-numeric:tabular-nums;text-align:center;font-size:12px}
.lstat .lsl{text-align:center;font-size:9px;color:var(--mut2);text-transform:uppercase;letter-spacing:.3px}
.lsbar{height:6px;border-radius:4px;background:#21314d;overflow:hidden}
.lsbar i{display:block;height:100%;background:var(--acc2);float:right}
.lsbar.r i{background:var(--acc);float:left}
.livehint{background:var(--panel);border:1px dashed var(--line);border-radius:11px;padding:11px 13px;margin-bottom:16px;font-size:12px;color:var(--mut);display:flex;align-items:center;flex-wrap:wrap;gap:6px}
.simpanel{margin-top:13px;border-top:1px solid var(--line);padding-top:11px}
.simhd{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut2);margin-bottom:9px;font-weight:700}
.simrow{display:grid;grid-template-columns:104px 1fr 28px;gap:9px;align-items:center;font-size:11px;margin:6px 0}
.simrow label{color:var(--mut)}
.simrow input[type=range]{accent-color:#ff6b81;width:100%}
.simrow span{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
@media(max-width:1100px){.col-groups{flex-basis:380px}}
/* mobile back bar (hidden on desktop) */
.mback{display:none;align-items:center;gap:8px;width:100%;background:var(--panel2);border:none;
  border-bottom:1px solid var(--line);color:var(--acc2);font-weight:800;font-size:14px;cursor:pointer;text-align:left}
/* ============ MOBILE ============ */
@media(max-width:680px){
  html,body{overflow:auto}
  header.top{gap:9px;padding:9px 12px}
  .brand{gap:9px}
  .brand .sub{display:none}
  .brand h1{font-size:13px;letter-spacing:.2px;white-space:nowrap}
  .trophy{width:30px;height:30px;font-size:17px;border-radius:8px}
  .upd{display:none}
  .spacer{display:none}
  .searchbox{flex:1;min-width:0}
  .searchbox input{width:100%}
  .ctrlbtn{width:34px;height:34px}
  /* tabs become a thumb-reachable bottom nav */
  .tabs{position:fixed;left:0;right:0;bottom:0;top:auto;z-index:90;border:none;border-top:1px solid var(--line);
    border-radius:0;background:#0b1220;justify-content:center;gap:8px;
    padding:7px 12px calc(7px + env(safe-area-inset-bottom))}
  .tab{flex:1;text-align:center;padding:12px 8px;font-size:13.5px}
  /* single column; detail slides in as a full overlay */
  .stage{display:block;overflow:visible}
  .col-groups{width:100%;border-right:none;padding:12px 12px calc(80px + env(safe-area-inset-bottom))}
  .legend{font-size:10.5px;gap:11px}
  .col-detail{position:fixed;inset:0;z-index:70;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:0 14px calc(84px + env(safe-area-inset-bottom));transform:translateX(100%);
    transition:transform .26s cubic-bezier(.4,0,.2,1);will-change:transform}
  body.detail-open .col-detail{transform:none}
  .mback{display:flex;position:sticky;top:0;z-index:6;margin:0 -14px 14px;padding:14px}
  .full{padding:14px 12px calc(84px + env(safe-area-inset-bottom))}
  /* standings: keep Team · P · GD · Pts (drop W/D/L and GF:GA) */
  table.stand th:nth-child(3),table.stand td:nth-child(3),
  table.stand th:nth-child(4),table.stand td:nth-child(4),
  table.stand th:nth-child(5),table.stand td:nth-child(5),
  table.stand th:nth-child(6),table.stand td:nth-child(6){display:none}
  td.tm{max-width:none;font-size:13px}
  table.stand td{padding:8px 4px}
  .fx{padding:11px 12px}
  /* detail content reflow */
  .hero{gap:13px;margin-bottom:15px}
  .hero .fg{font-size:42px}
  .hero h2{font-size:20px;line-height:1.15}
  .statgrid{grid-template-columns:repeat(2,1fr);gap:8px}
  .ringwrap{gap:14px}
  .kf{grid-template-columns:1fr;gap:6px}
  .cvc{grid-template-columns:1fr}
  .mp-head{gap:9px}
  .mp-side{padding:13px 8px}
  .mp-side .fg{font-size:34px}
  .mp-side .nm{font-size:14px}
  .xgline{padding:11px 13px}
  .xgv{font-size:21px}
  .players{grid-template-columns:1fr}
  /* bracket stays horizontal-scroll but tighter + bigger touch targets */
  .bracket{gap:13px}
  .round{min-width:158px}
  .slot{padding:10px 9px}
  .brk-top{gap:9px}
  .brk-top h2{font-size:17px}
  .cardgrid{grid-template-columns:1fr}
  /* controls become a bottom sheet above the tab bar */
  .ctrlpanel{position:fixed;left:8px;right:8px;bottom:calc(64px + env(safe-area-inset-bottom));top:auto;
    width:auto;max-height:64vh;overflow-y:auto;z-index:95}
}
</style>

"United States":"🇺🇸","Australia":"🇦🇺","Paraguay":"🇵🇾","Türkiye":"🇹🇷","Germany":"🇩🇪","Ivory Coast":"🇨🇮","Ecuador":"🇪🇨","Curaçao":"🇨🇼",

"Spain":"🇪🇸","Uruguay":"🇺🇾","Cape Verde":"🇨🇻","Saudi Arabia":"🇸🇦","France":"🇫🇷","Norway":"🇳🇴","Senegal":"🇸🇳","Iraq":"🇮🇶",

const fg=t=>FLAG[t]||"⚽";
const D=window.WC;
const HOSTS={"United States":1,"Canada":1,"Mexico":1};
const teamGroup={}, teamRow={};
Object.keys(D.groups).forEach(g=>D.groups[g].forEach(r=>{teamGroup[r.team]=g;teamRow[r.team]=r;}));

/* ===== Tunable model parameters (live via the ⚙ panel) ===== */
const WEIGHTS={fifa:0.45, val:0.0, form:0.15, att:0.15, def:0.15, mom:0.10}; // composite rating mix
const MATCH={base:1.30, gamma:0.60, host:0.15};                     // Poisson goals model (tuned on 2022)
let RAMP=3;   // games for tournament factors to reach full weight (small-sample guard)
// Squad value defaults to 0 weight: the 2022 backtest found it redundant with FIFA (it dropped accuracy).
// It's wired + tunable so you can dial it in; FIFA & value are anchors (full weight, never ramped).
const FACTOR_LABEL={fifa:"FIFA base",val:"Squad value",form:"Form",att:"Attack",def:"Defense",mom:"Momentum"};
function wsum(){return WEIGHTS.fifa+WEIGHTS.form+WEIGHTS.att+WEIGHTS.def+WEIGHTS.mom||1;}

/* ===== Per-team component metrics (z-scored across all 48 teams) ===== */
const M={}; let metricsReady=false; let _sc={};
const avg=a=>a.reduce((x,y)=>x+y,0)/a.length;
const sd=(a,m)=>Math.sqrt(avg(a.map(x=>(x-m)**2)))||1;
function zify(teams,raw){const v=teams.map(t=>M[t][raw]);const m=avg(v),s=sd(v,m);
  teams.forEach(t=>M[t]['z_'+raw]=(M[t][raw]-m)/s);}
function buildMetrics(){
  const teams=Object.keys(teamRow);
  teams.forEach(t=>{const r=teamRow[t],P=Math.max(r.P,1);
    M[t]={fifa:r.pts, vlog:Math.log(((D.marketValue||{})[t])||1), gfpg:r.GF/P, gapg:r.GA/P, P:r.P};});
  // Attack/Defense: per-game goals, shrunk toward the field average (small sample)
  const muGF=avg(teams.map(t=>M[t].gfpg)), muGA=avg(teams.map(t=>M[t].gapg)), k0=1.2;
  teams.forEach(t=>{const m=M[t],P=m.P||1;
    m.att=(m.gfpg*P+muGF*k0)/(P+k0);
    m.gaShrunk=(m.gapg*P+muGA*k0)/(P+k0);
    m.defg=-m.gaShrunk;});            // defensive rating: higher = stingier
  zify(teams,'fifa');                 // needed before form (opponent weighting)
  zify(teams,'vlog');                 // squad market value (log-scaled) — an anchor like FIFA
  // Form: result quality, weighted by opponent strength (beating/drawing a good side counts more)
  teams.forEach(t=>{const fm=teamForm(t);
    if(!fm.length){M[t].form=0;return;}
    M[t].form=avg(fm.map(g=>{const base=g.r==='W'?1:g.r==='D'?0.5:0;
      const oz=M[g.opp]?M[g.opp].z_fifa:0;
      const bonus=g.r==='W'?0.30*oz:g.r==='D'?0.18*oz:0.10*oz; // result vs strong opp = +, loss to strong = less bad
      return base+bonus;}));});
  // Momentum: trajectory of goal difference (latest match vs first)
  teams.forEach(t=>{const fm=teamForm(t);
    if(fm.length<2){M[t].mom=0;return;}
    const g=fm.map(x=>x.gf-x.ga);M[t].mom=g[g.length-1]-g[0];});
  zify(teams,'att'); zify(teams,'defg'); zify(teams,'form'); zify(teams,'mom');
  metricsReady=true; _sc={};
}
function strength(t){if(!metricsReady)buildMetrics();if(_sc[t]!=null)return _sc[t];const m=M[t];
  // Sample-size guard (backtested on 2022): tournament factors ramp from 0 to full weight over RAMP games,
  // so early-tournament noise can't swamp the FIFA anchor.
  const conf=Math.min((m.P||0)/RAMP,1);
  const wv=WEIGHTS.val||0;
  const tw=WEIGHTS.form+WEIGHTS.att+WEIGHTS.def+WEIGHTS.mom;
  const anchor=WEIGHTS.fifa*m.z_fifa + wv*m.z_vlog;                 // FIFA + squad value: full weight, never ramped
  const num=anchor + conf*(WEIGHTS.form*m.z_form+WEIGHTS.att*m.z_att+WEIGHTS.def*m.z_defg+WEIGHTS.mom*m.z_mom);
  const den=(WEIGHTS.fifa + wv + conf*tw)||1;
  return _sc[t]=num/den;}
function factorBars(t){if(!metricsReady)buildMetrics();const m=M[t];
  return {fifa:m.z_fifa, val:m.z_vlog, form:m.z_form, att:m.z_att, def:m.z_defg, mom:m.z_mom};}
function ratingIndex(t){return Math.max(1,Math.min(99,Math.round(50+18*strength(t))));}

/* ===== Match (goals) model: rating gap -> expected goals -> Poisson outcome ===== */
const FACT=[1,1,2,6,24,120,720,5040,40320,362880,3628800];
const pois=(k,l)=>Math.exp(-l)*Math.pow(l,k)/FACT[k];
function expectedGoals(a,b){
  const d=strength(a)-strength(b);
  let la=MATCH.base*Math.exp(MATCH.gamma*d/2);
  let lb=MATCH.base*Math.exp(-MATCH.gamma*d/2);
  if(HOSTS[a])la+=MATCH.host; if(HOSTS[b])lb+=MATCH.host;   // host xG edge
  return [la,lb];
}
function matchProbs(a,b){ // {h,d,a, la,lb, score:[i,j]}
  const [la,lb]=expectedGoals(a,b);const MX=8;
  const pa=[],pb=[];for(let i=0;i<=MX;i++){pa.push(pois(i,la));pb.push(pois(i,lb));}
  let h=0,dr=0,aw=0,best=[0,0,-1];
  for(let i=0;i<=MX;i++)for(let j=0;j<=MX;j++){const p=pa[i]*pb[j];
    if(i>j)h+=p;else if(i===j)dr+=p;else aw+=p;
    if(p>best[2])best=[i,j,p];}
  return {h,d:dr,a:aw,la,lb,score:[best[0],best[1]]};
}
function koWin(a,b){ // P(a advances) — a drawn KO is settled by a strength-tilted shootout
  const pr=matchProbs(a,b);
  const pen=1/(1+Math.exp(-1.1*(strength(a)-strength(b))));
  return pr.h + pr.d*pen;
}

// Standings ordering: Pts, GD, GF, FIFA rank
function gd(r){return r.GF-r.GA;}
function h2h(sub,g){ // mini-table among the tied teams only
  const names=new Set(sub.map(t=>t.team)), st={};
  sub.forEach(t=>st[t.team]={p:0,gd:0,gf:0});
  D.results.forEach(m=>{if(teamGroup[m.home]!==g||teamGroup[m.away]!==g)return;
    if(names.has(m.home)&&names.has(m.away)){const H=st[m.home],A=st[m.away];
      H.gf+=m.hs;A.gf+=m.as;H.gd+=m.hs-m.as;A.gd+=m.as-m.hs;
      if(m.hs>m.as)H.p+=3;else if(m.hs<m.as)A.p+=3;else{H.p++;A.p++;}}});
  return st;}
function orderGroup(g){
  // FIFA 2026 tiebreakers: points -> head-to-head (pts, GD, goals among tied) -> overall GD, goals -> FIFA rank
  const buckets={};[...D.groups[g]].forEach(t=>{(buckets[t.Pts]=buckets[t.Pts]||[]).push(t);});
  const out=[];
  Object.keys(buckets).map(Number).sort((a,b)=>b-a).forEach(p=>{
    const grp=buckets[p];
    if(grp.length>1){const h=h2h(grp,g);
      grp.sort((x,y)=>(h[y.team].p-h[x.team].p)||(h[y.team].gd-h[x.team].gd)||(h[y.team].gf-h[x.team].gf)
        ||(gd(y)-gd(x))||(y.GF-x.GF)||(x.rank-y.rank));}
    out.push.apply(out,grp);});
  return out;
}
// Form from results (last matches chronological)
function teamForm(t){
  const ms=D.results.filter(m=>m.home===t||m.away===t).sort((a,b)=>a.date.localeCompare(b.date));
  return ms.map(m=>{const home=m.home===t;const gf=home?m.hs:m.as,ga=home?m.as:m.hs;
    const opp=home?m.away:m.home;const r=gf>ga?'W':gf<ga?'L':'D';
    return {r,gf,ga,opp,home,date:m.date};});
}
function nextFixture(t){return D.fixtures.find(f=>f.home===t||f.away===t);}

/* ====================== LIVE IN-GAME MODEL ======================
   Feed format (live.json or a gist URL): {matches:[{home,away,minute,status,gh,ga,
   sotH,sotA,possH,possA,xgH,xgA,rcH,rcA}]}. All client-side; no feed -> simulator only. */
let LIVE_FEED={}, SIM=null, LIVE_MODE='ingame';
const LIVE_FEED_URL=(window.WC&&window.WC.liveFeedUrl)||'live.json';
const STAT_INFLUENCE={ingame:0.6, momentum:1.2};
function liveStateFor(h,a){const k=h+'|'+a; if(SIM&&SIM.key===k)return SIM.state; return LIVE_FEED[k]||null;}
function liveWinProb(h,a,st,infl){
  const [lh0,la0]=expectedGoals(h,a);                     // pre-match per-90 expected goals
  const rem=Math.max(0,(94-(st.minute||0)))/90;           // fraction of match remaining (incl ~4' stoppage)
  const rcH=st.rcH||0, rcA=st.rcA||0;
  const rcAdjH=Math.pow(1.30,rcA)*Math.pow(0.76,rcH);     // man-advantage swing
  const rcAdjA=Math.pow(1.30,rcH)*Math.pow(0.76,rcA);
  const tot=(st.sotH||0)+(st.sotA||0);
  const sot=tot>0?((st.sotH||0)-(st.sotA||0))/tot:0;                 // shot-on-target dominance -1..1
  const poss=(((st.possH!=null?st.possH:50)-(st.possA!=null?st.possA:50))/100); // -.5..5
  const xg=(st.xgH!=null&&st.xgA!=null)?(st.xgH-st.xgA):0;          // live xG diff (goals)
  const tilt=infl*(0.9*sot+0.5*poss+0.45*xg);             // how much "who's better today" bends the rate
  const lremH=Math.max(0.01,lh0*rem*rcAdjH*Math.exp(tilt));
  const lremA=Math.max(0.01,la0*rem*rcAdjA*Math.exp(-tilt));
  const MX=8,ph=[],pa=[];
  for(let i=0;i<=MX;i++){ph.push(pois(i,lremH));pa.push(pois(i,lremA));}
  let h2=0,d=0,a2=0;
  for(let i=0;i<=MX;i++)for(let j=0;j<=MX;j++){const p=ph[i]*pa[j];
    const fh=(st.gh||0)+i, fa=(st.ga||0)+j;
    if(fh>fa)h2+=p;else if(fh===fa)d+=p;else a2+=p;}
  return {h:h2,d,a:a2,lremH,lremA,rem};
}
function lsbarRow(label,vh,va,unit){
  const tot=(Math.abs(vh)+Math.abs(va))||1; const wl=Math.round(vh/tot*100);
  return `<div class="lstat"><div class="lsv">${vh}${unit||''}</div>
    <div class="lsbar"><i style="width:${wl}%"></i></div><div class="lsl">${label}</div>
    <div class="lsbar r"><i style="width:${100-wl}%"></i></div><div class="lsv">${va}${unit||''}</div></div>`;
}
function liveCardHtml(h,a){
  const st=liveStateFor(h,a); if(!st) return liveSimButton(h,a);
  const wp=liveWinProb(h,a,st,STAT_INFLUENCE[LIVE_MODE]);
  const oth=liveWinProb(h,a,st,STAT_INFLUENCE[LIVE_MODE==='ingame'?'momentum':'ingame']);
  const hh=Math.round(wp.h*100),dd=Math.round(wp.d*100),aa=100-hh-dd;
  const oh=Math.round(oth.h*100),od=Math.round(oth.d*100),oa=100-oh-od;
  const ml=st.status==='HT'?'HALF-TIME':(st.minute!=null?st.minute+"'":'LIVE');
  const isSim=SIM&&SIM.key===h+'|'+a;
  return `<div class="livecard">
    <div class="livetop"><span class="livedot"></span> ${isSim?'SIMULATED':'LIVE'} · ${ml}
      ${isSim?`<span class="simx" onclick="stopSim()">exit sim ✕</span>`:''}</div>
    <div class="livescore">${fg(h)} ${shrt(h)} <b>${st.gh||0}–${st.ga||0}</b> ${shrt(a)} ${fg(a)}</div>
    <div class="modetoggle">
      <button class="${LIVE_MODE==='ingame'?'on':''}" onclick="setLiveMode('ingame')">In-game WP</button>
      <button class="${LIVE_MODE==='momentum'?'on':''}" onclick="setLiveMode('momentum')">Stat momentum</button></div>
    <div class="probbar">
      <div class="pb h" style="width:${hh}%">${hh}%</div>
      <div class="pb d" style="width:${dd}%">${dd>7?dd+'%':''}</div>
      <div class="pb a" style="width:${aa}%">${aa}%</div></div>
    <div class="problabels"><span>${shrt(h)} win</span><span>Draw</span><span>${shrt(a)} win</span></div>
    <div class="othermode">${LIVE_MODE==='ingame'?'Stat-momentum':'In-game'} view would say ${oh}/${od}/${oa}</div>
    <div class="lstats">
      ${lsbarRow('Shots on target',st.sotH||0,st.sotA||0,'')}
      ${lsbarRow('Possession',(st.possH!=null?st.possH:50),(st.possA!=null?st.possA:50),'%')}
      ${(st.xgH!=null)?lsbarRow('Live xG',st.xgH,st.xgA,''):''}
      ${(st.rcH||st.rcA)?lsbarRow('Red cards',st.rcH||0,st.rcA||0,''):''}
    </div>
    ${isSim?simPanel(h,a):''}
  </div>`;
}
function liveSimButton(h,a){

function startSim(h,a){SIM={key:h+'|'+a,state:{minute:60,gh:1,ga:0,sotH:5,sotA:3,possH:55,possA:45,rcH:0,rcA:0}};

  if(selMatch)renderMatch(selMatch.h,selMatch.a);}

  const j=await r.json();LIVE_FEED={};(j.matches||[]).forEach(m=>LIVE_FEED[m.home+'|'+m.away]=m);

  const starH=cmStar(h),starA=cmStar(a);
  const P=[];
  // P1 — setup
  if(same){const ph=positionOf(h),pa=positionOf(a);
    P.push(`${cmPick(['Right, here’s the picture.','Let’s set the scene.','Here’s where it stands.'],seed)} `+
      `${shrt(h)} sit ${ph}${ordSuf(ph)} in Group ${gH} on ${rh.Pts} pt${rh.Pts===1?'':'s'}, ${shrt(a)} ${pa}${ordSuf(pa)} on ${ra.Pts}. `+
      `${cap(cmForm(h,seed))}. ${cap(cmForm(a,seed+'x'))}.`);
  } else {
    P.push(`${cmPick(['Knockout football.','No safety net now.','One game, winner moves on.'],seed)} `+
      `${shrt(h)} of Group ${gH} against ${shrt(a)} of Group ${gA}. `+
      `${cap(cmForm(h,seed))}. ${cap(cmForm(a,seed+'x'))}.`);
  }
  // P2 — the read
  if(live){const onTop=live.gh>live.ga?shrt(h):live.ga>live.gh?shrt(a):'level';
    P.push(`Live right now: <b>${shrt(h)} ${live.gh}-${live.ga} ${shrt(a)}</b>${live.minute!=null?`, ${live.minute}'`:''}. `+
      `${onTop==='level'?'Still all square, and ':`${onTop} in front, but `}`+
      `${shrt(h)} bring ${cmTac(h,seed)} and ${shrt(a)} have ${cmTac(a,seed+'2')}. Model now expects around ${pr.score[0]}-${pr.score[1]} by full time.`);
  } else {
    let p2=`On the eye test, ${shrt(h)} bring ${cmTac(h,seed)}; ${shrt(a)} have ${cmTac(a,seed+'2')}.`;
    if(starH&&starH.note)p2+=` Watch ${starH.name} for ${shrt(h)}: ${starH.note}.`;else if(starH)p2+=` ${starH.name} is the one to watch for ${shrt(h)}.`;
    if(starA&&starA.note)p2+=` For ${shrt(a)}, ${starA.name} is the danger — ${starA.note}.`;
    P.push(p2);
  }
  // P3 — verdict (skip the bold call for live; the live read already covers it)
  if(played){const fav=hh>=aa?h:a;
    P.push(`That one’s in the books — final score up top. Pre-match the model leaned ${shrt(fav)} (${Math.max(hh,aa)}% win, ${dd}% draw), so ${cmPick(['see how the read held up against what actually happened.','the result either backed the model or busted it.'],seed)}`);
  } else if(!live){
    P.push(cmVerdict(h,a,pr,hh,dd,aa));
  }
  // P4 — stakes from the sim (group games only)
  if(same&&!played){
    let stake=`${cap(cmFate(h))}. ${cap(cmFate(a))}.`;
    const tr=[];[h,a].forEach(t=>{const L=cmThirdRace(t);if(L)tr.push(L);});
    if(tr.length)stake+=' '+tr.join(' ');
    const adv=t=>{const f=getSim().fin[t];return f.p1+f.p2+f.p3q;};
    const nx=[];if(adv(h)>0.4){const L=cmNext(h);if(L)nx.push(L);}
    if(adv(a)>0.4){const L=cmNext(a);if(L)nx.push(L);}
    if(nx.length)stake+=' '+nx.join(' ');
    P.push(stake);
  } else if(!same&&!played){
    P.push(`Win and you’re into the next round; lose and the tournament’s over. ${cmPick(['Simple as that.','No tomorrow for the loser.'],seed)}`);
  }
  return `<div class="lowdown"><div class="ldh">📋 The lowdown</div>${P.map(x=>`<p>${x}</p>`).join('')}</div>`;
}
function facHtml(t){const b=factorBars(t);

    return `<div class="factor"><span class="fl">${FACTOR_LABEL[k]}</span>

function findKoContext(h,a){
  const f=D.fixtures.find(x=>(x.home===h&&x.away===a)||(x.home===a&&x.away===h));

  return '';
}

  const q=e.target.value.trim().toLowerCase();if(!q){return;}
  // match team
  let tt=Object.keys(teamRow).find(t=>t.toLowerCase().includes(q));
  if(!tt){ // match player
    for(const t of Object.keys(D.squads)){if(D.squads[t].p.some(p=>p[0].toLowerCase().includes(q))){tt=t;break;}}
  }
  if(tt){selectTeam(tt);}
};
document.getElementById('search').onkeydown=e=>{if(e.key==='Enter'){e.target.blur();}};

/* ===== Model controls (live sliders) ===== */
const WDEF={...WEIGHTS}, MDEF={...MATCH}, RDEF=RAMP;
const CTRLS=[
  {grp:'Composite rating weights'},
  {k:'fifa',o:'W',label:'FIFA base'},{k:'val',o:'W',label:'Squad value'},{k:'form',o:'W',label:'Form'},
  {k:'att',o:'W',label:'Attack'},{k:'def',o:'W',label:'Defense'},{k:'mom',o:'W',label:'Momentum'},
  {k:'ramp',o:'R',label:'Factor ramp',min:1,max:5,step:1},
  {grp:'Match (goals) model'},
  {k:'base',o:'M',label:'Base goals',min:0.8,max:2,step:0.05},
  {k:'gamma',o:'M',label:'Gap sens.',min:0.2,max:1.4,step:0.05},
  {k:'host',o:'M',label:'Host xG',min:0,max:0.6,step:0.05}
];
const cval=c=>c.o==='W'?WEIGHTS[c.k]:c.o==='M'?MATCH[c.k]:RAMP;
const cfmt=(c,v)=>(c.step&&c.step>=1)?String(v):(+v).toFixed(2);
function setParam(o,k,v){if(o==='W')WEIGHTS[k]=v;else if(o==='M')MATCH[k]=v;else RAMP=v;}
function buildControls(){
  const p=document.getElementById('ctrlPanel');let html=`<h4>⚙ Model controls</h4>
    <div style="font-size:10.5px;color:var(--mut2);margin-bottom:2px">Weights auto-normalise. <b>Factor ramp</b> = games before tournament factors reach full trust. Defaults tuned on Qatar 2022.</div>`;
  const fmtmap={};CTRLS.forEach(c=>{if(c.k)fmtmap[c.k]=c;});
  CTRLS.forEach(c=>{
    if(c.grp){html+=`<div class="grp2">${c.grp}</div>`;return;}
    const val=cval(c),mn=c.min??0,mx=c.max??1,st=c.step??0.05;
    html+=`<div class="slider"><label>${c.label}</label>
      <input type="range" min="${mn}" max="${mx}" step="${st}" value="${val}" data-o="${c.o}" data-k="${c.k}">
      <span class="sv" id="sv_${c.k}">${cfmt(c,val)}</span></div>`;
  });
  html+=`<button class="btn" id="ctrlReset" style="width:100%;margin-top:11px">↺ Reset to defaults</button>`;
  p.innerHTML=html;
  p.querySelectorAll('input[type=range]').forEach(inp=>inp.oninput=()=>{
    const o=inp.dataset.o,k=inp.dataset.k,v=parseFloat(inp.value);
    setParam(o,k,v);document.getElementById('sv_'+k).textContent=cfmt(fmtmap[k],v);
    _sc={};bracketPairs=null;render();});
  document.getElementById('ctrlReset').onclick=()=>{
    Object.assign(WEIGHTS,WDEF);Object.assign(MATCH,MDEF);RAMP=RDEF;_sc={};bracketPairs=null;buildControls();render();
    document.getElementById('ctrlPanel').classList.add('on');};
}
document.getElementById('gear').onclick=()=>document.getElementById('ctrlPanel').classList.toggle('on');
document.getElementById('syncBtn').onclick=syncNow;
buildControls();
render();
pollLive();   // optional auxiliary live.json feed
setTimeout(()=>syncNow(),350);   // auto-pull the latest scores on every load / refresh
</script>
</body>
